name: dbt CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DBT_SNOWFLAKE_ACCOUNT: ${{ secrets.DBT_SNOWFLAKE_ACCOUNT }}
  DBT_SNOWFLAKE_USER: ${{ secrets.DBT_SNOWFLAKE_USER }}
  DBT_SNOWFLAKE_PASSWORD: ${{ secrets.DBT_SNOWFLAKE_PASSWORD }}

jobs:
  dbt-ci:
    name: dbt deps → debug → seed → run → test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dbt_user
          POSTGRES_PASSWORD: dbt_pass
          POSTGRES_DB: ecommerce
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dbt_user -d ecommerce"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DBT_HOST: 127.0.0.1
      DBT_PORT: 5432
      DBT_USER: dbt_user
      DBT_PASSWORD: dbt_pass
      DBT_DB: ecommerce
      DBT_SCHEMA: public
      DBT_PROFILES_DIR: profiles_local

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "dbt-postgres>=1.7,<2.0"

      - name: Install dbt packages
        run: dbt deps --profiles-dir "$DBT_PROFILES_DIR"

      - name: dbt debug
        run: dbt debug --profiles-dir "$DBT_PROFILES_DIR"

      - name: dbt seed
        run: dbt seed --full-refresh --profiles-dir "$DBT_PROFILES_DIR"

      - name: dbt run
        run: dbt run --full-refresh --profiles-dir "$DBT_PROFILES_DIR"

      - name: dbt test
        run: dbt test --profiles-dir "$DBT_PROFILES_DIR"

      - name: dbt docs generate
        if: always()
        run: dbt docs generate --profiles-dir "$DBT_PROFILES_DIR"

      - name: Upload dbt artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts
          path: |
            target/run_results.json
            target/manifest.json
            target/catalog.json
            target/index.html
          retention-days: 14
